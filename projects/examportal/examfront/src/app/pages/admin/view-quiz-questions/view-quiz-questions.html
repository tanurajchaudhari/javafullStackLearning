<h1 class="mt20">Questions of {{ qTitle }}</h1>
<div class="booststrap-wrapper">
  <div class="row">
    <div class="col-md-12">
      <div class="container text-center mt10">
        <button mat-raised-button color="accent" [routerLink]="'/admin/add-questions/' + qId+'/'+qTitle">
          Add Question
        </button>
      
          
        
      </div>
      <mat-card *ngFor="let q of questions; let i = index" class="mt20">
        <mat-card-content>
          <p>
            <b>Q {{ i + 1 }}&nbsp;</b><span class="ml10" [innerHTML]="q.content"></span>
          </p>

          <div class="container-fluid">
            <div class="row">
              <div class="col-md-6">
                <p><b>1) </b>{{ q.option1 }}</p>
              </div>
              <div class="col-md-6">
                <p><b>2) </b>{{ q.option2 }}</p>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6">
                <p><b>3) </b>{{ q.option3 }}</p>
              </div>
              <div class="col-md-6">
                <p><b>4) </b>{{ q.option4 }}</p>
              </div>
            </div>
            <mat-divider></mat-divider>
            <p><b>Corresct Answer : </b>{{ q.answer }}  </p>

           </div>
         
        </mat-card-content>
        <mat-card-actions >
            <div class="container text-center mb20" >
            <button mat-raised-button color="primary" class="mr20 " [routerLink]="'/admin/update-question/'+q.quesId">Update</button>
            <button mat-raised-button color="warn" class="ml20" (click)="deleteQuestion(q.quesId)">DELETE</button>
          </div>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
</div>
