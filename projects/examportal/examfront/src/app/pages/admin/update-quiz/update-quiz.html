<mat-card>
  <h1>Update Quiz</h1>
  <div class="container">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <form *ngIf="quizData" (ngSubmit)="updateQuiz()">
          <!-- text field -->
          <mat-form-field class="w100" appearance="fill">
            <mat-label>Enter your title</mat-label>
            <input [(ngModel)]="quizData.title" type="text" name="title" placeholder="Enter here" matInput />
          </mat-form-field>

          <!-- description field -->
          <mat-form-field class="w100" appearance="fill">
            <mat-label>Enter Description</mat-label>
            <textarea
              [(ngModel)]="quizData.description"
              type="text"
              name="description"
              placeholder="Enter here"
              matInput
              rows="4"
            ></textarea>
          </mat-form-field>
          <div class="row">
            <div class="col-md-6">
              <!-- max marks -->
              <mat-form-field class="w100" appearance="fill">
                <mat-label>Enter Maximum Marks</mat-label>
                <input [(ngModel)]="quizData.maxmarks" type="text" name="maxMarks" placeholder="Enter here" matInput />
              </mat-form-field>
            </div>
            <div class="col-md-6">
              <!-- number of questions to be displayed  -->
              <mat-form-field class="w100" appearance="fill">
                <mat-label>Enter number of questions</mat-label>
                <input [(ngModel)]="quizData.numberOfQuestions" type="text" name="numberOfQuestions" placeholder="Enter here" matInput />
              </mat-form-field>
            </div>
          </div>
          <!-- active field  -->
          <mat-slide-toggle class="mt20" name="active" [(ngModel)]="quizData.active">
             Publish Status
          </mat-slide-toggle>
           <br>
         <!-- // category select  -->
            <mat-form-field appearance="fill" class="mt20 w100">
            <mat-label>Categories</mat-label>
            <mat-select [(ngModel)]="quizData.category.cid" name="category">
                <mat-option *ngFor="let c of categories" [value]="c.cid">
                    {{c.title}}
                </mat-option>
            </mat-select>

           </mat-form-field>
           <div class="container text-center mb20">
                <button mat-raised-button color="accent" type="submit">Update Quiz</button>
           </div>
        </form>
      </div>
    </div>
  </div>
</mat-card>
