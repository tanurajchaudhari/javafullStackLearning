<div class="booststrap-wrapper">
    <div class="container-fluid mt20">
        <h2>Availabel quizzes</h2>
        <div class="row mt20" *ngIf="quizzes">
            <div class="col-md-4 mt20" *ngFor="let q of quizzes">
               <mat-card class="mt20  ">
                <mat-card-header>
                     <div mat-card-avatar class="example-header-image"></div>
                    <mat-card-title>
                      {{q.title}}
                    </mat-card-title>
                   <mat-card-subtitle>
                       {{q.category.title}}
                   </mat-card-subtitle>
                </mat-card-header>
                <mat-card-content>
                    <p class="truncate">{{q.description}}</p>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-button color="primary">view</button>
                    <button mat-button color="accent" [routerLink]="'/user/instructions/'+q.qId">start</button>
                    <button mat-button color="accent">questions : {{q.numberOfQuestions}}</button>
                    <button mat-button color="accent">M.M: {{q.maxmarks}}</button>


                </mat-card-actions>
               </mat-card>
            </div>
            <div class="col-md-12" *ngIf="quizzes.length == 0">
                <mat-card>
                    <mat-card-content>
                        <h1>
                            No data in his  category 
                        </h1>
                    </mat-card-content>
                </mat-card>
            </div>
        </div>
    </div>
</div>
